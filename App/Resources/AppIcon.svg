<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- macOS rounded rect clip -->
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
    <!-- Background gradient: deep navy to dark blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <!-- Fan blade gradient: cyan to blue -->
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Thermal accent: warm orange glow -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle inner shadow -->
    <radialGradient id="innerLight" cx="0.3" cy="0.2" r="0.8">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#innerLight)"/>

    <!-- Subtle thermal glow bottom-right -->
    <circle cx="680" cy="680" r="400" fill="url(#glow)"/>

    <!-- Fan blades (3 blades, rotated) -->
    <g transform="translate(512, 490)" opacity="0.95">
      <!-- Blade 1 -->
      <path d="M0,-40 C60,-40 120,-180 80,-280 C60,-330 20,-340 0,-280 C-10,-240 -30,-100 0,-40Z"
            fill="url(#blade)" opacity="0.9"/>
      <!-- Blade 2 (rotated 120°) -->
      <path d="M0,-40 C60,-40 120,-180 80,-280 C60,-330 20,-340 0,-280 C-10,-240 -30,-100 0,-40Z"
            fill="url(#blade)" opacity="0.9" transform="rotate(120)"/>
      <!-- Blade 3 (rotated 240°) -->
      <path d="M0,-40 C60,-40 120,-180 80,-280 C60,-330 20,-340 0,-280 C-10,-240 -30,-100 0,-40Z"
            fill="url(#blade)" opacity="0.9" transform="rotate(240)"/>
      <!-- Center hub -->
      <circle cx="0" cy="0" r="44" fill="#1e293b" stroke="#38bdf8" stroke-width="6"/>
      <circle cx="0" cy="0" r="18" fill="#38bdf8" opacity="0.8"/>
    </g>

    <!-- Circular speed ring -->
    <circle cx="512" cy="490" r="320" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.15"/>
    <circle cx="512" cy="490" r="340" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.08"/>

    <!-- Temperature arc indicator (bottom) -->
    <path d="M 320 760 A 240 240 0 0 1 704 760"
          fill="none" stroke="url(#blade)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <!-- Warm segment of arc -->
    <path d="M 580 748 A 240 240 0 0 1 704 760"
          fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

    <!-- Small tick marks on arc -->
    <g opacity="0.3" stroke="#94a3b8" stroke-width="2">
      <line x1="340" y1="755" x2="340" y2="770"/>
      <line x1="420" y1="740" x2="420" y2="755"/>
      <line x1="512" y1="736" x2="512" y2="751"/>
      <line x1="604" y1="740" x2="604" y2="755"/>
      <line x1="684" y1="755" x2="684" y2="770"/>
    </g>
  </g>
</svg>
