name: Release

# GitHub Actions macOS runner에 Xcode 26.3 (Swift 6.2)이 추가되면 활성화
# on:
#   push:
#     tags:
#       - 'v*'
on: workflow_dispatch

permissions:
  contents: write

env:
  APP_NAME: AeroPulse
  SCHEME: AeroPulse
  HELPER_ID: com.dan.aeropulse.helperd2
  # Team ID is supplied by a GitHub Actions secret only when signing with a
  # Developer ID Application cert. Ad-hoc / unsigned builds run without it.
  TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build-and-release:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Mise + Tuist
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          brew install mise
          eval "$(mise activate bash)"
          mise install
          mise x tuist@4.162.1 -- tuist generate --no-open

      # ── Optional: Code signing (requires Developer ID certificate) ──
      - name: Import signing certificate
        id: signing
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
        run: |
          if [[ -z "$CERTIFICATES_P12" ]]; then
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            echo "No signing certificate configured — building unsigned."
            exit 0
          fi

          echo "has_cert=true" >> "$GITHUB_OUTPUT"

          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATES_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATES_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build release
        run: |
          BUILD_ARGS=(
            -workspace AeroPulse.xcworkspace
            -scheme $SCHEME
            -configuration Release
            -derivedDataPath .derived/release
          )

          if [[ "${{ steps.signing.outputs.has_cert }}" == "true" ]]; then
            BUILD_ARGS+=(
              DEVELOPMENT_TEAM=$TEAM_ID
              CODE_SIGN_STYLE=Manual
              "CODE_SIGN_IDENTITY=Developer ID Application"
              CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO
              "OTHER_CODE_SIGN_FLAGS=--options runtime --timestamp"
              PROVISIONING_PROFILE_SPECIFIER=
            )
          else
            BUILD_ARGS+=(CODE_SIGNING_ALLOWED=NO)
          fi

          xcodebuild "${BUILD_ARGS[@]}"

      - name: Package app bundle
        run: |
          APP_SOURCE=".derived/release/Build/Products/Release/$APP_NAME.app"
          APP_DEST="out/release/$APP_NAME.app"
          mkdir -p out/release
          cp -R "$APP_SOURCE" "$APP_DEST"

      # ── Optional: Sign + notarize (requires Developer ID) ──
      - name: Sign app bundle
        if: steps.signing.outputs.has_cert == 'true'
        run: |
          SIGN_ID="Developer ID Application"
          APP_DEST="out/release/$APP_NAME.app"
          HELPER_PATH="$APP_DEST/Contents/Library/PrivilegedHelperTools/AeroPulsePrivilegedHelper"
          XPC_PATH="$APP_DEST/Contents/XPCServices/AeroPulseControlService.xpc"

          # Sign inside-out: helper → XPC → app
          if [[ -f "$HELPER_PATH" ]]; then
            /usr/bin/codesign --force --sign "$SIGN_ID" \
              --identifier "$HELPER_ID" \
              --options runtime \
              --entitlements App/Support/AeroPulsePrivilegedHelper.entitlements \
              --timestamp "$HELPER_PATH"
          fi

          if [[ -d "$XPC_PATH" ]]; then
            /usr/bin/codesign --force --sign "$SIGN_ID" \
              --options runtime --timestamp "$XPC_PATH"
          fi

          /usr/bin/codesign --force --sign "$SIGN_ID" \
            --options runtime \
            --entitlements App/Support/AeroPulse.entitlements \
            --timestamp "$APP_DEST"

      - name: Create DMG
        run: |
          chmod +x scripts/create-dmg.sh
          ./scripts/create-dmg.sh "out/release/$APP_NAME.app" out/release

      - name: Notarize DMG
        if: steps.signing.outputs.has_cert == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "$APPLE_ID" ]]; then
            echo "APPLE_ID not set — skipping notarization."
            exit 0
          fi
          DMG_PATH=$(ls out/release/*.dmg | head -1)
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      # ── Release ──
      - name: Extract version
        id: version
        run: |
          APP_PATH="out/release/$APP_NAME.app"
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH/Contents/Info.plist")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          DMG_PATH=$(ls out/release/*.dmg | head -1)
          DMG_NAME=$(basename "$DMG_PATH")

          gh release create "$TAG" \
            --title "AeroPulse $VERSION" \
            --notes "$(cat <<'EOF'
          ## Install

          ### Homebrew (recommended)
          ```bash
          brew install inhwa-son/tap/aeropulse
          ```

          ### Manual
          Download the `.dmg` below, open it, and drag AeroPulse to Applications.

          > Manual downloads may trigger a Gatekeeper warning. Right-click → Open, or run:
          > `xattr -cr /Applications/AeroPulse.app`

          See [CHANGELOG.md](https://github.com/inhwa-son/aeropulse-mac/blob/main/CHANGELOG.md) for details.
          EOF
          )" \
            "$DMG_PATH#$DMG_NAME"

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping cask update."
            exit 0
          fi
          chmod +x scripts/update-homebrew-cask.sh
          ./scripts/update-homebrew-cask.sh \
            "${{ steps.version.outputs.version }}" \
            "$(ls out/release/*.dmg | head -1)"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
