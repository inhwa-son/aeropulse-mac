name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.4"
    validations:
      required: true

  - type: input
    id: mac-model
    attributes:
      label: Mac model
      placeholder: "e.g. MacBook Pro M4 Pro"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: AeroPulse version
      placeholder: "e.g. 1.0.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open AeroPulse
        2. Go to ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant console logs or attach screenshots.
    validations:
      required: false
